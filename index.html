<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="가계부" />
<meta name="theme-color" content="#F4EEF2" />
<title>가계부</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
<style>
  :root{--bg:#F4EEF2;--card:#FFFFFF;--ink:#2A1B28;--sub:#82707D;--faint:#AE9FA9;--line:#EADFE6;--line2:#E0D2DB;--income:#6E3A5C;--expense:#A85E7D;--shadow:0 1px 2px rgba(42,27,40,.05),0 8px 24px rgba(42,27,40,.07);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;overflow-x:hidden;max-width:100%;}
  body{font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;line-height:1.5;}
  .num{font-variant-numeric:tabular-nums;font-feature-settings:"tnum";}
  .wrap{max-width:480px;margin:0 auto;padding:0 18px 120px;}
  header{max-width:480px;margin:0 auto;padding:20px 18px 8px;display:flex;align-items:center;justify-content:space-between;min-height:52px;gap:8px;}
  .brand{font-size:17px;font-weight:800;letter-spacing:-.02em;}
  .hleft{display:flex;align-items:center;gap:6px;}
  .gear{width:34px;height:34px;border:none;background:transparent;color:var(--sub);font-size:17px;cursor:pointer;border-radius:9px;display:flex;align-items:center;justify-content:center;}
  .gear:hover{background:#0000000a;}
  .hback{display:flex;align-items:center;gap:5px;}
  .hback button{width:30px;height:34px;border:none;background:transparent;color:var(--ink);font-size:22px;cursor:pointer;border-radius:8px;display:flex;align-items:center;justify-content:center;margin-left:-6px;}
  .hback .vtitle{font-size:17px;font-weight:800;letter-spacing:-.02em;}
  .monthnav{display:flex;align-items:center;gap:2px;}
  .monthnav button{width:34px;height:34px;border:none;background:transparent;border-radius:9px;color:var(--sub);font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
  .monthnav button:hover{background:#0000000a;}
  .monthnav .ml{font-size:15px;font-weight:700;letter-spacing:-.01em;min-width:84px;text-align:center;}
  .hero{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:22px 22px 20px;box-shadow:var(--shadow);margin-top:6px;}
  .hero .lab{font-size:12.5px;color:var(--sub);font-weight:600;letter-spacing:-.01em;}
  .hero .bal,.hero .total{font-size:38px;font-weight:800;letter-spacing:-.035em;margin:2px 0 0;line-height:1.12;}
  .hero .bal.neg{color:var(--expense);}
  .gauge{height:7px;border-radius:99px;background:#EFE7EC;overflow:hidden;margin:16px 0 9px;}
  .gauge>i{display:block;height:100%;border-radius:99px;background:var(--expense);transition:width .5s cubic-bezier(.2,.7,.2,1);}
  .gtext{font-size:12.5px;color:var(--sub);font-weight:500;}
  .gtext b{color:var(--ink);font-weight:700;}
  .meta{font-size:12.5px;color:var(--sub);font-weight:500;}
  .meta b{color:var(--ink);font-weight:700;}
  .meta .sep{color:var(--line2);margin:0 8px;}
  .ie{display:flex;gap:10px;margin-top:16px;}
  .ie>div{flex:1;border:1px solid var(--line);border-radius:13px;padding:11px 13px;}
  .ie .t{font-size:11.5px;color:var(--sub);font-weight:600;display:flex;align-items:center;gap:5px;}
  .ie .t i{width:6px;height:6px;border-radius:99px;display:inline-block;}
  .ie .v{font-size:17px;font-weight:800;letter-spacing:-.02em;margin-top:3px;}
  .navcards{display:flex;gap:11px;margin-top:13px;}
  .navcard{flex:1;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px 16px 14px;box-shadow:var(--shadow);cursor:pointer;transition:transform .1s;}
  .navcard:active{transform:scale(.985);}
  .navcard .nt{font-size:12.5px;font-weight:700;color:var(--sub);display:flex;align-items:center;gap:6px;}
  .navcard .nt i{width:8px;height:8px;border-radius:99px;}
  .navcard .nv{font-size:21px;font-weight:800;letter-spacing:-.03em;margin-top:9px;}
  .navcard .ns{font-size:11.5px;color:var(--faint);font-weight:600;margin-top:3px;}
  .navcard .go{font-size:12px;color:var(--faint);font-weight:700;margin-top:11px;}
  .alert{display:flex;align-items:center;gap:11px;background:#FBF1EC;border:1px solid #F0DCD2;border-radius:16px;padding:14px 16px;margin-top:13px;cursor:pointer;}
  .alert .ai{width:30px;height:30px;border-radius:9px;background:#E8A48C;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;flex:0 0 auto;}
  .alert .at{flex:1;min-width:0;}
  .alert .at .a1{font-size:13px;font-weight:700;color:#A85A47;}
  .alert .at .a2{font-size:11.5px;color:#B07A6B;font-weight:600;margin-top:1px;}
  .alert . av{font-size:15px;font-weight:800;color:#A85A47;letter-spacing:-.02em;}
  .sec{margin-top:26px;}
  .sechead{display:flex;align-items:baseline;justify-content:space-between;padding:0 4px 11px;}
  .sechead h2{font-size:14px;font-weight:800;letter-spacing:-.02em;margin:0;}
  .sechead .m{font-size:12px;color:var(--faint);font-weight:600;cursor:pointer;}
  .sechead .m.act{color:var(--income);}
  .brk{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:6px 16px;box-shadow:var(--shadow);}
  .brow{display:flex;align-items:center;gap:11px;padding:12px 0;border-bottom:1px solid var(--line);}
  .brow:last-child{border-bottom:none;}
  .dot{width:9px;height:9px;border-radius:99px;flex:0 0 auto;}
  .bmid{flex:1;min-width:0;}
  .bname{font-size:13.5px;font-weight:600;letter-spacing:-.01em;}
  .btrack{height:5px;background:#F2EAEF;border-radius:99px;margin-top:6px;overflow:hidden;}
  .btrack>i{display:block;height:100%;border-radius:99px;transition:width .5s cubic-bezier(.2,.7,.2,1);}
  .bamt{font-size:13.5px;font-weight:700;letter-spacing:-.02em;white-space:nowrap;}
  .bpct{font-size:11px;color:var(--faint);font-weight:600;margin-left:7px;}
  .list{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;}
  .daygrp .dayhd{font-size:11.5px;font-weight:700;color:var(--faint);padding:13px 16px 7px;}
  .item{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-top:1px solid var(--line);transition:background .12s;}
  .item:active{background:#00000006;}
  .list>.item:first-child,.daygrp .item:first-of-type{border-top:none;}
  .item .ic{width:34px;height:34px;border-radius:11px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:12.5px;font-weight:800;color:#fff;letter-spacing:-.02em;}
  .item .mid{flex:1;min-width:0;}
  .item .cat{font-size:14px;font-weight:600;letter-spacing:-.01em;}
  .item .memo{font-size:12px;color:var(--sub);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .item .amt{font-size:14.5px;font-weight:700;letter-spacing:-.02em;white-space:nowrap;color:var(--expense);}
  .jobs{display:flex;flex-direction:column;gap:11px;}
  .job{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px 16px;box-shadow:var(--shadow);}
  .jtop{display:flex;align-items:flex-start;gap:11px;}
  .jdot{width:10px;height:10px;border-radius:99px;margin-top:5px;flex:0 0 auto;}
  .jname{flex:1;min-width:0;cursor:pointer;}
  .jname .nm{font-size:15px;font-weight:700;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:flex;align-items:center;gap:7px;}
  .tag{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:6px;letter-spacing:-.01em;flex:0 0 auto;}
  .tag.h{background:#EFE6ED;color:#6E3A5C;}
  .tag.f{background:#F0EAEF;color:#8A5C7E;}
  .jname .wage{font-size:12.5px;color:var(--sub);font-weight:500;margin-top:2px;}
  .jname .wage em{font-style:normal;color:var(--faint);}
  .jname .wage .unset{color:#C08A52;font-weight:600;}
  .jedit{border:none;background:transparent;color:var(--faint);font-size:13px;font-weight:600;cursor:pointer;padding:4px 6px;border-radius:8px;}
  .jedit:hover{background:#0000000a;color:var(--sub);}
  .jcalc{display:flex;align-items:flex-end;gap:12px;margin-top:14px;}
  .hwrap{flex:0 0 auto;}
  .hlab{font-size:11px;color:var(--faint);font-weight:700;margin:0 0 5px 2px;}
  .hbox{display:flex;align-items:center;background:var(--bg);border:1.5px solid var(--line2);border-radius:11px;padding:0 11px;height:44px;width:108px;transition:border-color .15s;}
  .hbox:focus-within{border-color:var(--ink);}
  .hbox input{width:100%;border:none;outline:none;background:transparent;font-family:inherit;font-size:17px;font-weight:800;color:var(--ink);text-align:right;font-variant-numeric:tabular-nums;letter-spacing:-.01em;}
  .hbox input::placeholder{color:#CFC9BE;}
  .hbox .u{font-size:12.5px;color:var(--faint);font-weight:700;margin-left:5px;}
  .pwrap{flex:1;text-align:right;}
  .plab{font-size:11px;color:var(--faint);font-weight:700;margin:0 2px 5px 0;}
  .pval{font-size:21px;font-weight:800;letter-spacing:-.025em;color:var(--income);}
  .pval .w{color:var(--faint);font-weight:700;margin-right:1px;}
  .paydate{font-size:11.5px;color:var(--sub);font-weight:600;margin-top:5px;}
  .jbar{height:4px;background:#F2EAEF;border-radius:99px;margin-top:13px;overflow:hidden;}
  .jbar>i{display:block;height:100%;border-radius:99px;transition:width .45s cubic-bezier(.2,.7,.2,1);}
  .sched{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;}
  .srow{display:flex;align-items:center;gap:12px;padding:13px 16px;border-top:1px solid var(--line);}
  .srow:first-child{border-top:none;}
  .srow.done{opacity:.55;}
  .recv{width:26px;height:26px;border-radius:99px;border:1.8px solid var(--line2);background:transparent;color:transparent;font-size:14px;font-weight:800;cursor:pointer;flex:0 0 auto;display:flex;align-items:center;justify-content:center;transition:.15s;}
  .recv.on{background:var(--income);border-color:var(--income);color:#fff;}
  .sdate{flex:0 0 auto;text-align:center;min-width:40px;}
  .sdate .d{font-size:19px;font-weight:800;letter-spacing:-.03em;line-height:1;}
  .sdate .mo{font-size:10.5px;color:var(--faint);font-weight:700;margin-top:3px;}
  .snames{flex:1;min-width:0;}
  .snames .n1{font-size:13.5px;font-weight:700;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .snames .n2{font-size:11px;color:var(--faint);font-weight:600;margin-top:1px;}
  .samt{font-size:15px;font-weight:800;letter-spacing:-.025em;color:var(--income);white-space:nowrap;}
  .samt.due{color:#B07A6B;}
  .empty{text-align:center;padding:42px 24px;}
  .empty .e1{font-size:14px;font-weight:700;color:var(--ink);}
  .empty .e2{font-size:12.5px;margin-top:6px;color:var(--sub);line-height:1.6;}
  .setlist{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;}
  .setrow{display:flex;align-items:center;gap:12px;padding:15px 16px;border-top:1px solid var(--line);}
  .setrow:first-child{border-top:none;}
  .setrow .sl{flex:1;min-width:0;}
  .setrow .sl .t1{font-size:14px;font-weight:700;letter-spacing:-.01em;}
  .setrow .sl .t2{font-size:11.5px;color:var(--sub);margin-top:2px;line-height:1.5;}
  .setbtn{border:1.5px solid var(--line2);background:var(--card);border-radius:11px;padding:9px 15px;font-family:inherit;font-size:13.5px;font-weight:700;color:var(--ink);cursor:pointer;flex:0 0 auto;}
  .setbtn.danger{border-color:#E7C9C6;color:var(--expense);}
  .codebox{background:#F2EFE8;border:1px solid var(--line2);border-radius:10px;padding:10px 12px;font-size:11px;color:var(--sub);word-break:break-all;font-family:ui-monospace,Menlo,monospace;margin-top:8px;line-height:1.6;}
  .atable{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow);overflow:hidden;}
  .ahd,.arow{display:flex;align-items:center;padding:12px 16px;gap:10px;}
  .arow{border-top:1px solid var(--line);}
  .ahd{font-size:11px;color:var(--faint);font-weight:700;}
  .ac1{flex:1;min-width:0;font-size:13.5px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ac2{width:96px;text-align:right;font-size:13.5px;font-weight:700;font-variant-numeric:tabular-nums;}
  .ac2.g{color:var(--faint);font-weight:600;}
  .arow.tot{border-top:1.5px solid var(--line2);background:#FBFAF7;}
  .arow.tot .ac1{font-weight:800;}
  .arow.tot .ac2{font-weight:800;color:var(--income);}
  .fab{position:fixed;left:50%;transform:translateX(-50%);bottom:26px;z-index:30;width:min(444px,calc(100% - 36px));height:54px;border:none;border-radius:16px;background:var(--ink);color:#fff;font-family:inherit;font-size:15.5px;font-weight:700;letter-spacing:-.01em;cursor:pointer;box-shadow:0 10px 30px rgba(32,32,29,.28);display:flex;align-items:center;justify-content:center;gap:7px;transition:transform .12s;}
  .fab:active{transform:translateX(-50%) scale(.985);}
  .fab .plus{font-size:21px;line-height:1;margin-top:-1px;}
  .ov{position:fixed;inset:0;z-index:40;background:rgba(28,27,24,.42);display:flex;align-items:flex-end;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s;}
  .ov.on{opacity:1;pointer-events:auto;}
  .sheet{width:100%;max-width:480px;background:var(--bg);border-radius:24px 24px 0 0;padding:8px 20px max(22px,env(safe-area-inset-bottom));transform:translateY(18px);transition:transform .24s cubic-bezier(.2,.8,.2,1);max-height:92vh;overflow-y:auto;}
  .ov.on .sheet{transform:translateY(0);}
  .grab{width:38px;height:4px;border-radius:99px;background:var(--line2);margin:8px auto 14px;}
  .shtitle{font-size:16px;font-weight:800;letter-spacing:-.02em;margin:0 0 6px;text-align:center;}
  .shsub{font-size:12px;color:var(--income);font-weight:700;text-align:center;margin:0 0 16px;}
  .fld{margin-bottom:15px;}
  .flab{font-size:12px;font-weight:700;color:var(--sub);margin:0 0 7px 3px;letter-spacing:-.01em;}
  .inp{width:100%;border:1.5px solid var(--line2);border-radius:13px;background:var(--card);font-family:inherit;font-size:15px;color:var(--ink);padding:14px 15px;outline:none;transition:border-color .15s;}
  .inp:focus{border-color:var(--ink);}
  .amtbox{display:flex;align-items:center;background:var(--card);border:1.5px solid var(--line2);border-radius:14px;padding:0 16px;height:58px;}
  .amtbox .won{font-size:20px;font-weight:800;color:var(--faint);margin-right:4px;}
  .amtbox input{flex:1;border:none;outline:none;background:transparent;font-family:inherit;font-size:26px;font-weight:800;letter-spacing:-.02em;color:var(--ink);text-align:right;font-variant-numeric:tabular-nums;}
  .amtbox input::placeholder{color:#D5D0C6;}
  .wagebox{display:flex;align-items:center;background:var(--card);border:1.5px solid var(--line2);border-radius:14px;padding:0 16px;height:56px;}
  .wagebox .won{font-size:18px;font-weight:800;color:var(--faint);margin-right:4px;}
  .wagebox input{flex:1;border:none;outline:none;background:transparent;font-family:inherit;font-size:23px;font-weight:800;letter-spacing:-.02em;color:var(--ink);text-align:right;font-variant-numeric:tabular-nums;}
  .wagebox input::placeholder{color:#D5D0C6;}
  .wagebox .u{font-size:13px;color:var(--faint);font-weight:700;margin-left:6px;white-space:nowrap;}
  .chips{display:flex;flex-wrap:wrap;gap:7px;}
  .chip{display:flex;align-items:center;gap:6px;border:1.5px solid var(--line2);background:var(--card);border-radius:11px;padding:8px 12px;font-family:inherit;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer;transition:all .14s;letter-spacing:-.01em;}
  .chip i{width:8px;height:8px;border-radius:99px;}
  .chip.act{border-color:var(--ink);color:var(--ink);background:#fff;}
  .seg2{display:flex;background:#EAE6DD;border-radius:12px;padding:4px;}
  .seg2 button{flex:1;border:none;background:transparent;font-family:inherit;font-size:14px;font-weight:700;color:var(--sub);padding:10px;border-radius:9px;cursor:pointer;transition:.15s;letter-spacing:-.01em;}
  .seg2 button.act{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.08);}
  .seg2.sm button{padding:7px;font-size:12.5px;}
  .daychips{display:flex;flex-wrap:wrap;gap:7px;align-items:center;}
  .dchip{border:1.5px solid var(--line2);background:var(--card);border-radius:10px;padding:9px 13px;font-family:inherit;font-size:13.5px;font-weight:700;color:var(--sub);cursor:pointer;transition:.14s;font-variant-numeric:tabular-nums;}
  .dchip.act{border-color:var(--ink);color:var(--ink);}
  .dcustom{display:flex;align-items:center;gap:4px;border:1.5px solid var(--line2);border-radius:10px;padding:0 11px;height:39px;}
  .dcustom input{width:34px;border:none;outline:none;background:transparent;font-family:inherit;font-size:14px;font-weight:700;text-align:center;color:var(--ink);}
  .dcustom span{font-size:12.5px;color:var(--faint);font-weight:600;}
  .preview{font-size:12.5px;color:var(--income);font-weight:700;margin-top:11px;padding-left:3px;letter-spacing:-.01em;}
  .actions{display:flex;gap:10px;margin-top:22px;}
  .btn{flex:1;border:none;border-radius:14px;font-family:inherit;font-size:15px;font-weight:700;padding:15px;cursor:pointer;letter-spacing:-.01em;transition:transform .1s,opacity .15s;}
  .btn:active{transform:scale(.98);}
  .btn.primary{background:var(--ink);color:#fff;flex:2;}
  .btn.primary:disabled{opacity:.4;cursor:default;}
  .btn.ghost{background:#EAE6DD;color:var(--ink);}
  .btn.danger{background:#fff;border:1.5px solid #E7C9C6;color:var(--expense);}
  .delrow{display:flex;gap:10px;margin-top:11px;align-items:center;}
  .delrow .q{font-size:13px;font-weight:600;color:var(--expense);flex:1;text-align:center;}
  .repbar{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 16px;box-shadow:var(--shadow);margin-top:11px;cursor:pointer;font-size:13.5px;font-weight:700;letter-spacing:-.01em;}
  .repbar .rb-go{color:var(--faint);font-weight:700;}
  .repbar.warn{background:#FBF1EC;border-color:#F0DCD2;color:#A85A47;}
  .repbar.warn .rb-go{color:#A85A47;}
  .rgrid{display:flex;gap:10px;margin-top:13px;}
  .rcard{flex:1;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:var(--shadow);}
  .rcard .rl{font-size:11.5px;color:var(--sub);font-weight:600;}
  .rcard .rv{font-size:18px;font-weight:800;letter-spacing:-.025em;margin-top:5px;}
  .deltaup{color:var(--expense);} .deltadn{color:var(--income);}
  .bulkrow{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);}
  .bulkrow:last-child{border-bottom:none;}
  .bulkrow .bi{width:8px;height:8px;border-radius:99px;flex:0 0 auto;}
  .bulkrow .bm{flex:1;min-width:0;font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .bulkrow .bc{font-size:11px;color:var(--faint);font-weight:600;}
  .bulkrow .ba{font-size:13.5px;font-weight:800;color:var(--expense);white-space:nowrap;}
  .bulkrow .bx{border:none;background:transparent;color:var(--faint);font-size:16px;cursor:pointer;padding:0 2px;}
  .ta{width:100%;min-height:120px;border:1.5px solid var(--line2);border-radius:13px;background:var(--card);font-family:inherit;font-size:14px;color:var(--ink);padding:13px 15px;outline:none;resize:vertical;line-height:1.6;}
  .ta:focus{border-color:var(--ink);}
  .amtbox input,.wagebox input,.hbox input{min-width:0;}
  @media (prefers-reduced-motion:reduce){*{transition:none!important;}}
  button:focus-visible,input:focus-visible,.item:focus-visible,.jname:focus-visible,.navcard:focus-visible{outline:2px solid var(--ink);outline-offset:2px;}

<script>
const K_INCOME='fin_income_v1',K_QTY='fin_qty_v1',K_FIXED='fin_fixed_v1',K_TX='fin_tx_v1',K_RECV='fin_received_v1',K_BUD='fin_budgets_v1',K_SET='fin_settings_v1',K_ACCT='fin_accounts_v1',K_LEARN='fin_learned_v1',K_SEED='fin_seed_v1',K_SNAP='fin_snap_v1';
const PAL=['#2E6B53','#4F8C6E','#6B8E9E','#A87B9E','#C2625A','#B5896A','#9088B2','#5FA39A','#C9A463','#8C8678'];
const CATS=[['식비','#B5896A'],['카페·간식','#C9A463'],['교통','#5FA39A'],['레슨·전공','#C2625A'],['반주·연주','#B06A4E'],['악보·교재','#9088B2'],['미용·뷰티','#CB7E96'],['쇼핑·의류','#A87B9E'],['콘텐츠·촬영','#5E8C7D'],['문화·여가','#7A9B76'],['구독·멤버십','#7E9BB0'],['의료·건강','#86A36F'],['주거·공과금','#8C8678'],['경조사','#C99A52'],['기타','#9E9A92']];
const CATKW=[['카페·간식',['스타벅스','스벅','투썸','이디야','메가','커피','카페','공차','빽다방','파리바게','뚜레쥬르','베이커리','도넛','컴포즈','폴바셋']],['식비',['배민','배달의민족','요기요','쿠팡이츠','김밥','분식','식당','맥도날','버거','롯데리아','맘스터치','마라','국밥','치킨','피자','편의점','gs25','cu','세븐일레븐','이마트24','한식','일식','중식','정육','정육점','마트','농협','하나로','반찬','마켓']],['교통',['택시','카카오t','지하철','버스','교통','주유','충전','기차','코레일','srt','ktx','대리','하이패스','톨','석유','주유소']],['미용·뷰티',['올리브영','다이소','화장품','뷰티','세포라','네일','미용실','헤어','피부','왁싱','시코르','아모레']],['쇼핑·의류',['무신사','지그재그','에이블리','유니클로','자라','의류','쇼핑','쿠팡','29cm','브랜디','아울렛','신세계','롯데백화점']],['문화·여가',['cgv','메가박스','롯데시네마','영화','공연','예매','인터파크','yes24','교보문고','노래방','전시','콘서트','티켓']],['구독·멤버십',['넷플릭스','유튜브','스포티파이','애플','구독','멤버십','chatgpt','오픈ai','melon','멜론','왓챠','디즈니','icloud','구글','노션']],['의료·건강',['약국','병원','의원','치과','한의원','클리닉','건강','피트니스','헬스','요가','필라테스']],['주거·공과금',['통신','skt','kt','유플','요금','관리비','월세','전기','가스','수도','보험','도시가스']],['레슨·전공',['레슨','반주','성악','보컬','코치','아카데미']],['악보·교재',['악보','교재','도서']]];
const WD=['일','월','화','수','목','금','토'];
const now=new Date();
let taxMode='net';
let S={view:'home',exTab:'irregular',y:now.getFullYear(),m:now.getMonth(),income:[],qty:{},fixed:[],tx:[],received:{},budgets:{},accounts:[],learned:{},snap:{},q:'',settings:{},modal:null};

const fmt=n=>Math.round(n||0).toLocaleString('ko-KR');
const won=n=>'₩'+fmt(n);
const pad=n=>String(n).padStart(2,'0');
const monthKey=(y,m)=>y+'-'+pad(m+1);
const curKey=()=>monthKey(S.y,S.m);
const qtyDisp=h=>h?(Number.isInteger(h)?h:parseFloat(h.toFixed(2))):'';
const colorOf=i=>PAL[i%PAL.length];
const colorOfCat=n=>{const f=CATS.find(c=>c[0]===n);return f?f[1]:'#9E9A92';};
const newId=()=>Date.now()+'_'+Math.floor(Math.random()*1e5);
const todayISO=()=>{const d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());};
const esc=s=>String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function compressImage(file,cb){try{const img=new Image();const url=URL.createObjectURL(file);img.onload=()=>{const max=1000;let w=img.width,h=img.height;if(w>h&&w>max){h=Math.round(h*max/w);w=max;}else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);let d=null;try{d=c.toDataURL('image/jpeg',0.5);}catch(e){}URL.revokeObjectURL(url);cb(d);};img.onerror=()=>{URL.revokeObjectURL(url);cb(null);};img.src=url;}catch(e){cb(null);}}
function parseLines(text){
  const raw=(text||'').split(/[\n\r]+/).map(s=>s.trim()).filter(Boolean);
  const timeRe=/^\d{1,2}:\d{2}$/;
  const dateRe=/(\d{1,2})\s*월\s*(\d{1,2})\s*일/;
  const negRe=/[-−–ー]\s*([\d][\d,]*)\s*원?/;
  const hasNeg=raw.some(l=>negRe.test(l));
  const out=[];
  let cy=new Date().getFullYear(),cm=null,cd=null;
  function addText(arr,line){
    line=line.replace(/[₩]/g,'').trim(); if(!line||!/[가-힣A-Za-z]/.test(line))return;
    if(arr.length){var last=arr[arr.length-1];var op=(last.match(/\(/g)||[]).length,cl=(last.match(/\)/g)||[]).length;if(op>cl){arr[arr.length-1]=last+' '+line;return;}var lo=(line.match(/\(/g)||[]).length,lc=(line.match(/\)/g)||[]).length;if(lc>lo){arr[arr.length-1]=last+' '+line;return;}}
    arr.push(line);
  }
  if(hasNeg){
    const amounts=[],texts=[];
    for(let line of raw){
      const dm=line.match(dateRe); if(dm){cm=+dm[1];cd=+dm[2];continue;}
      if(timeRe.test(line)) continue;
      const neg=line.match(negRe);
      if(neg){const before=line.slice(0,neg.index);addText(texts,before);amounts.push(parseInt(neg[1].replace(/,/g,''),10));continue;}
      if(/^[\d,]+\s*원?$/.test(line)) continue;
      addText(texts,line);
    }
    if(amounts.length){
      const date=(cm&&cd)?(cy+'-'+pad(cm)+'-'+pad(cd)):todayISO();
      for(let i=0;i<amounts.length;i++){
        const amt=amounts[i]; if(!(amt>0&&amt<100000000))continue;
        const memo=(texts[i]||'').slice(0,24);
        const cat=learnedCat(memo)||guessCat(memo)||CATS[14][0];
        out.push({amount:amt,category:cat,memo:memo||cat,date});
      }
      if(out.length) return out;
    }
  }
  raw.forEach(line=>{
    if(dateRe.test(line)||timeRe.test(line)) return;
    const nums=[...line.matchAll(/([0-9]{1,3}(?:,[0-9]{3})+|[0-9]{4,})\s*원?/g)].map(m=>parseInt(m[1].replace(/,/g,''),10)).filter(n=>!isNaN(n)&&n>0&&n<100000000);
    if(!nums.length) return;
    const amount=Math.max(...nums);
    let memo=line.replace(/[0-9,]+\s*원?/g,' ').replace(/(승인|취소|일시불|할부|체크|카드|결제|사용|누적|잔액|원)/g,' ').replace(/[\[\]\(\)\*]/g,' ').replace(/\s+/g,' ').trim().slice(0,24);
    const cat=learnedCat(memo)||guessCat(line)||CATS[14][0];
    out.push({amount,category:cat,memo,date:todayISO()});
  });
  return out;
}

function payDateForMonth(o,y,m){
  const timing=o.payTiming||'next'; let py=y,pm=m;
  if(timing==='next'){pm++;if(pm>11){pm=0;py++;}}
  const last=new Date(py,pm+1,0).getDate();
  let day=o.payDay; if(day===undefined||day===null)day=10;
  if(day==='last'||day>last)day=last; if(day<1)day=1;
  return new Date(py,pm,day);
}
const payDateFor=o=>payDateForMonth(o,S.y,S.m);
const payShort=d=>(d.getMonth()+1)+'월 '+d.getDate()+'일 입금';
const payFull=d=>(d.getMonth()+1)+'월 '+d.getDate()+'일 ('+WD[d.getDay()]+')';

function readJSON(k){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch(e){return null;}}
function setK(k,v){try{localStorage.setItem(k,JSON.stringify(v));return true;}catch(e){return false;}}
function persistIncome(){setK(K_INCOME,S.income);}
function persistQty(){setK(K_QTY,S.qty);}
function persistSnap(){setK(K_SNAP,S.snap);}
function persistFixed(){setK(K_FIXED,S.fixed);}
function persistTx(){setK(K_TX,S.tx);}
function persistRecv(){setK(K_RECV,S.received);}
function persistBud(){setK(K_BUD,S.budgets);}
function persistSet(){S.settings.taxMode=taxMode;setK(K_SET,S.settings);}
function persistAcct(){setK(K_ACCT,S.accounts);}
function persistLearn(){setK(K_LEARN,S.learned);}
const daysSince=iso=>{try{return Math.floor((Date.now()-Date.parse(iso))/86400000);}catch(e){return null;}}
const ymd=()=>{const d=new Date();return ''+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());};
function learnKey(memo){try{return (memo||'').toLowerCase().replace(/[0-9]/g,'').replace(/[^\p{L} ]/gu,'').replace(/\s+/g,' ').trim().slice(0,20);}catch(e){return (memo||'').toLowerCase().trim().slice(0,20);}}
function learnedCat(memo){const k=learnKey(memo);if(!k)return '';if(S.learned[k])return S.learned[k];for(const lk in S.learned){if(lk&&(k.includes(lk)||lk.includes(k)))return S.learned[lk];}return '';}
function rememberCat(memo,cat){const k=learnKey(memo);if(k&&cat){S.learned[k]=cat;persistLearn();}}
function persistAll(){persistIncome();persistQty();persistSnap();persistFixed();persistTx();persistRecv();persistBud();persistAcct();persistLearn();persistSet();}

function guessCat(s){const t=(s||'').toLowerCase();for(const[cat,kws]of CATKW){for(const k of kws){if(t.includes(k.toLowerCase()))return cat;}}return '';}
function parseQuick(){
  let p; try{p=new URLSearchParams(location.search);}catch(e){return null;}
  if(!p.get('add')&&!p.get('text')&&!p.get('amount'))return null;
  let amount=parseInt((p.get('amount')||'').replace(/[^0-9]/g,''),10);
  let memo=p.get('memo')||'',cat=p.get('cat')||'',date=p.get('date')||todayISO();
  const text=p.get('text')||'';
  if(text){
    const nums=[...text.matchAll(/([0-9]{1,3}(?:,[0-9]{3})+|[0-9]{4,})\s*원?/g)].map(m=>parseInt(m[1].replace(/,/g,''),10)).filter(n=>!isNaN(n));
    if(!amount&&nums.length)amount=Math.max(...nums);
    if(!memo){const lines=text.split(/[\n\r]+/).map(s=>s.trim()).filter(Boolean);const cand=lines.find(l=>/[가-힣A-Za-z]/.test(l)&&!/^\d/.test(l)&&l.length<=24);memo=(cand||lines[0]||'').slice(0,30);}
    if(!cat)cat=guessCat(text+' '+memo);
  }
  if(!cat&&memo)cat=learnedCat(memo)||guessCat(memo);
  if(!cat)cat=CATS[14][0];
  if(isNaN(amount))amount=0;
  return {amount,memo:memo.trim(),category:cat,date};
}

async function load(){
  try{
    S.income=readJSON(K_INCOME)||[];
    S.qty=readJSON(K_QTY)||{};
    S.snap=readJSON(K_SNAP)||{};
    S.fixed=readJSON(K_FIXED)||[];
    S.tx=readJSON(K_TX)||[];
    S.received=readJSON(K_RECV)||{};
    S.budgets=readJSON(K_BUD)||{};
    S.accounts=readJSON(K_ACCT)||[];
    S.learned=readJSON(K_LEARN)||{};
    S.settings=readJSON(K_SET)||{};
    taxMode=S.settings.taxMode||'net';
    const seeded=readJSON(K_SEED);
    if(!seeded){
      if(S.income.length===0){
        S.income=[
          {id:newId()+'a',name:'학과 조교',type:'hourly',wage:0,payTiming:'next',payDay:17,tax:0},
          {id:newId()+'b',name:'레슨 강사료',type:'fixed',wage:0,payTiming:'next',payDay:10,tax:3.3},
          {id:newId()+'c',name:'협찬·콘텐츠',type:'fixed',wage:0,payTiming:'next',payDay:25,tax:3.3},
        ];
      }
      if(S.fixed.length===0){
        S.fixed=[
          {id:newId()+'d',name:'정기 레슨비',amount:0,category:'레슨·전공',payDay:null},
          {id:newId()+'e',name:'통신비',amount:0,category:'주거·공과금',payDay:null},
        ];
      }
      persistAll();setK(K_SEED,1);
    }
  }catch(e){}
  try{render();}catch(e){document.getElementById('app').innerHTML='<div class="hero"><div class="lab">표시 중 문제가 생겼어요</div><div class="gtext" style="margin-top:8px">새로고침해도 안 되면 알려주세요.</div></div>';}
  try{
    const p=new URLSearchParams(location.search);
    if(p.get('text')){
      const txt=p.get('text');const rows=parseLines(txt);history.replaceState(null,'',location.pathname);
      if(rows.length>=2){S.modal={kind:'bulk',mode:'add',text:txt,rows};}
      else if(rows.length===1){const r=rows[0];S.modal={kind:'tx',mode:'add',amount:r.amount,category:r.category,date:r.date,memo:r.memo,receipt:null,fx:null,quick:true,confirmDel:false};}
      else{S.modal={kind:'tx',mode:'add',amount:0,category:CATS[0][0],date:todayISO(),memo:'',receipt:null,fx:null,quick:true,confirmDel:false};}
      renderModal();
    }else{
      const q=parseQuick();
      if(q){S.modal={kind:'tx',mode:'add',amount:q.amount,category:q.category,date:q.date,memo:q.memo,receipt:null,fx:null,confirmDel:true&&false,quick:true};history.replaceState(null,'',location.pathname);renderModal();}
    }
  }catch(e){}
}

const qtyOf=(id,mk)=>(S.qty[mk]&&S.qty[mk][id])||0;
const taxFactor=s=>taxMode==='net'?(1-(s.tax||0)/100):1;
const taxFactorOf=tax=>taxMode==='net'?(1-(tax||0)/100):1;
const rateFor=(s,mk)=>{const r=S.snap&&S.snap[mk]&&S.snap[mk][s.id];return r?{wage:r.wage,tax:r.tax||0}:{wage:s.wage,tax:s.tax||0};};
const amtFor=(s,mk)=>{const r=rateFor(s,mk);return Math.round(qtyOf(s.id,mk)*r.wage*taxFactorOf(r.tax));};
const incTotal=()=>S.income.reduce((a,s)=>a+amtFor(s,curKey()),0)+monthIncomeTx().reduce((a,t)=>a+t.amount,0);
const incomeForMonth=(y,m)=>{const mk=monthKey(y,m);return S.income.reduce((a,s)=>a+amtFor(s,mk),0)+S.tx.filter(t=>(t.date||'').slice(0,7)===mk&&t.type==='income').reduce((a,t)=>a+t.amount,0);};
const expenseForMonth=(y,m)=>{const mk=monthKey(y,m);return S.fixed.reduce((a,f)=>a+fixedMonthly(f,m),0)+S.tx.filter(t=>(t.date||'').slice(0,7)===mk&&t.type!=='income').reduce((a,t)=>a+t.amount,0);};
const acctTotal=()=>S.accounts.reduce((a,x)=>a+(x.balance||0),0);
function monthTx(){const k=curKey();return S.tx.filter(t=>(t.date||'').slice(0,7)===k&&t.type!=='income');}
function monthIncomeTx(){const k=curKey();return S.tx.filter(t=>(t.date||'').slice(0,7)===k&&t.type==='income');}
function fixedMonthly(f,m){const c=f.cycle||'monthly';if(c==='weekly')return Math.round((f.amount||0)*52/12);if(c==='session')return Math.round((f.amount||0)*(f.count||1));if(c==='yearly')return ((f.payMonth||1)===(m+1))?(f.amount||0):0;return f.amount||0;}
const expFixed=()=>S.fixed.reduce((a,f)=>a+fixedMonthly(f,S.m),0);
const expIrr=()=>monthTx().reduce((a,t)=>a+t.amount,0);
const expTotal=()=>expFixed()+expIrr();
function expenseByCat(){const by={};S.fixed.forEach(f=>{const v=fixedMonthly(f,S.m);if(v>0)by[f.category]=(by[f.category]||0)+v;});monthTx().forEach(t=>{by[t.category]=(by[t.category]||0)+t.amount;});return by;}
function expenseByCatSorted(){return Object.entries(expenseByCat()).sort((a,b)=>b[1]-a[1]);}
const isRecv=(id,mk)=>!!(S.received[mk]&&S.received[mk][id]);
function incomePayments(){const mk=curKey();return S.income.filter(s=>amtFor(s,mk)>0).map(s=>({s,date:payDateFor(s),amount:amtFor(s,mk),recv:isRecv(s.id,mk)})).sort((a,b)=>a.date-b.date);}
function incomeScheduleGrouped(){const sc={};incomePayments().forEach(p=>{const k=p.date.getTime();if(!sc[k])sc[k]={date:p.date,amount:0,names:[]};sc[k].amount+=p.amount;sc[k].names.push(p.s.name);});return Object.values(sc).sort((a,b)=>a.date-b.date);}
function unpaidThisMonth(){const mk=curKey();return incomePayments().filter(p=>!p.recv).reduce((a,p)=>a+p.amount,0);}
function outstanding(){const today=new Date();const tm=new Date(today.getFullYear(),today.getMonth(),today.getDate()).getTime();let total=0;const items=[];Object.keys(S.qty).forEach(mk=>{const y=+mk.slice(0,4),m=+mk.slice(5,7)-1;S.income.forEach(s=>{const amt=amtFor(s,mk);if(amt<=0)return;if(isRecv(s.id,mk))return;const d=payDateForMonth(s,y,m);if(d.getTime()<tm){total+=amt;items.push({name:s.name,date:d,amount:amt});}});});items.sort((a,b)=>a.date-b.date);return {total,items};}

function renderHeader(){
  const mn=`<div class="monthnav"><button onclick="FIN.month(-1)" aria-label="이전 달">‹</button><div class="ml num">${S.y}. ${pad(S.m+1)}</div><button onclick="FIN.month(1)" aria-label="다음 달">›</button></div>`;
  const yn=`<div class="monthnav"><button onclick="FIN.yr(-1)" aria-label="이전 해">‹</button><div class="ml num">${S.y}년</div><button onclick="FIN.yr(1)" aria-label="다음 해">›</button></div>`;
  let html;
  if(S.view==='home') html=`<div class="hleft"><div class="brand">가계부</div></div><div class="hleft"><button class="gear" onclick="FIN.go('settings')" aria-label="설정">⚙</button>${mn}</div>`;
  else if(S.view==='annual') html=`<div class="hback"><button onclick="FIN.go('income')" aria-label="뒤로">‹</button><span class="vtitle">연간 정산</span></div>${yn}`;
  else if(S.view==='settings') html=`<div class="hback"><button onclick="FIN.go('home')" aria-label="뒤로">‹</button><span class="vtitle">설정</span></div><div></div>`;
  else if(S.view==='report') html=`<div class="hback"><button onclick="FIN.go('home')" aria-label="뒤로">‹</button><span class="vtitle">리포트</span></div>${mn}`;
  else html=`<div class="hback"><button onclick="FIN.go('home')" aria-label="뒤로">‹</button><span class="vtitle">${S.view==='income'?'수익':'지출'}</span></div>${mn}`;
  document.getElementById('hdr').innerHTML=html;
}

function paymentRow(p){const taxNote=(taxMode==='net'&&p.s.tax>0)?` · ${p.s.tax}% 공제`:'';

  else{const q=(S.q||'').trim().toLowerCase();const sb=`<div style="margin-bottom:12px"><input class="inp" placeholder="🔍 가맹점·메모·분류 검색 (전체 기간)" value="${esc(S.q||'')}" onchange="FIN.searchIn(this.value)">${q?`<div class="m act" style="text-align:right;margin-top:6px;cursor:pointer" onclick="FIN.searchIn('')">✕ 검색 해제</div>`:''}</div>`;

function renderReport(){
  const inc=incomeForMonth(S.y,S.m),exp=expenseForMonth(S.y,S.m),save=inc-exp;
  const rate=inc>0?Math.round(save/inc*100):0;
  let pm=S.m-1,py=S.y;if(pm<0){pm=11;py--;}
  const pexp=expenseForMonth(py,pm);const ediff=exp-pexp;
  const cats=expenseByCatSorted().slice(0,3);const assets=acctTotal();
  const tgt=S.settings.cardTarget||0;const used=exp;const tp=tgt>0?Math.min(used/tgt*100,100):0;
  const top=cats.length?`<div class="brk">${cats.map(([n,a])=>{const c=colorOfCat(n);return `<div class="brow"><span class="dot" style="background:${c}"></span><div class="bmid"><div class="bname">${esc(n)}</div></div><div class="bamt num">${fmt(a)}</div></div>`;}).join('')}</div>`:`<div class="brk"><div class="empty"><div class="e2">이번 달 지출이 없어요</div></div></div>`;
  document.getElementById('app').innerHTML=`
    <div class="hero"><div class="lab">${S.m+1}월 저축</div><div class="bal num ${save<0?'neg':''}">${save<0?'−':''}${won(Math.abs(save))}</div><div class="meta" style="margin-top:10px">저축률 <b>${rate}%</b><span class="sep">·</span>수입 <b class="num">${fmt(inc)}</b> · 지출 <b class="num">${fmt(exp)}</b></div></div>
    <div class="rgrid"><div class="rcard"><div class="rl">전월 지출 대비</div><div class="rv num ${ediff>0?'deltaup':ediff<0?'deltadn':''}">${ediff>0?'▲':ediff<0?'▼':'-'} ${fmt(Math.abs(ediff))}</div></div><div class="rcard"><div class="rl">자산 합계</div><div class="rv num">₩${fmt(assets)}</div></div></div>
    <div class="sec"><div class="sechead"><h2>지출 Top 3</h2></div>${top}</div>
    ${tgt>0?`<div class="sec"><div class="sechead"><h2>카드 실적</h2><div class="m">${fmt(used)} / ${fmt(tgt)}</div></div><div class="brk"><div class="brow"><div class="bmid" style="width:100%"><div class="btrack"><i style="width:${tp}%;background:${used>=tgt?'var(--income)':'var(--ink)'}"></i></div></div><div class="bamt num">${Math.round(tp)}%</div></div></div></div>`:''}
    <div class="sec"><div class="sechead"><h2>계좌</h2><div class="m" onclick="FIN.go('settings')">관리 ›</div></div>${S.accounts.length?`<div class="list">${S.accounts.map(a=>`<div class="item"><div class="ic" style="background:#8C8678">${esc((a.name||' ').slice(0,1))}</div><div class="mid"><div class="cat">${esc(a.name)}</div></div><div class="amt num" style="color:var(--ink)">₩${fmt(a.balance||0)}</div></div>`).join('')}</div>`:`<div class="list"><div class="empty"><div class="e2">설정에서 계좌·잔액을 추가하면 자산이 모여요</div></div></div>`}</div>`;
}
function render(){
  renderHeader();
  if(S.view==='income')renderIncome();
  else if(S.view==='expense')renderExpense();
  else if(S.view==='annual')renderAnnual();
  else if(S.view==='settings')renderSettings();
  else if(S.view==='report')renderReport();
  else renderHome();
  renderFab();renderModal();
}
function renderFab(){
  const fab=document.getElementById('fab');
  if(S.view==='settings'||S.view==='annual'||S.view==='report'){fab.style.display='none';return;}
  fab.style.display='flex';let label,fn;
  if(S.view==='income'){label='수입원 추가';fn=()=>FIN.incAdd();}
  else if(S.view==='expense'){if(S.exTab==='fixed'){label='고정지출 추가';fn=()=>FIN.fixAdd();}else{label='내역 추가';fn=()=>FIN.txAdd();}}
  else{label='지출 기록';fn=()=>FIN.txAdd();}
  fab.innerHTML=`<span class="plus">+</span> ${label}`;fab.onclick=fn;
}

const grab=()=>'<div class="grab"></div>';
function catChips(cur){return CATS.map(([n,c])=>`<button class="chip ${cur===n?'act':''}" onclick="FIN.setCat('${n}')"><i style="background:${c}"></i>${esc(n)}</button>`).join('');}
function dayChips(cur,allowNone){const pre=[10,15,20,25];let h=pre.map(d=>`<button class="dchip ${cur===d?'act':''}" onclick="FIN.setDay(${d})">${d}일</button>`).join('');h+=`<button class="dchip ${cur==='last'?'act':''}" onclick="FIN.setDay('last')">말일</button>`;if(allowNone)h+=`<button class="dchip ${(cur===null||cur===undefined)?'act':''}" onclick="FIN.setDay(null)">미설정</button>`;h+=`<div class="dcustom"><input inputmode="numeric" maxlength="2" placeholder="직접" value="${(typeof cur==='number'&&!pre.includes(cur))?cur:''}" onchange="FIN.dayCustom(this)"><span>일</span></div>`;return h;}
function taxChips(cur){const opts=[['없음',0],['3.3%',3.3]];let h=opts.map(([l,v])=>`<button class="dchip ${cur===v?'act':''}" onclick="FIN.setTaxRate(${v})">${l}</button>`).join('');h+=`<div class="dcustom"><input inputmode="decimal" maxlength="5" placeholder="직접" value="${(cur&&cur!==3.3&&cur!==0)?cur:''}" onchange="FIN.taxCustom(this)"><span>%</span></div>`;return h;}
const validOf=md=>md.kind==='income'?(md.name.trim()&&md.wage>0):md.kind==='fixed'?(md.name.trim()&&md.amount>0):md.kind==='budget'?(md.amount>0):md.kind==='account'?(md.name.trim()!==''):md.kind==='bulk'?true:md.amount>0;
function actions(md,addL,editL){const v=validOf(md);return `<div class="actions"><button class="btn ghost" onclick="FIN.close()">취소</button><button class="btn primary" ${v?'':'disabled'} onclick="FIN.save()">${md.mode==='add'?addL:editL}</button></div>`;}
function delBtn(md,label){if(md.mode!=='edit')return'';return md.confirmDel?`<div class="delrow"><span class="q">정말 삭제할까요?</span><button class="btn ghost" style="flex:0 0 auto;padding:13px 18px" onclick="FIN.cancelDel()">취소</button><button class="btn danger" style="flex:0 0 auto;padding:13px 18px" onclick="FIN.doDel()">삭제</button></div>`:`<button class="btn danger" style="width:100%;margin-top:11px" onclick="FIN.askDel()">${label} 삭제</button>`;}

  go(v){S.view=v;S.modal=null;render();window.scrollTo(0,0);},
  tab(t){S.exTab=t;render();},
  month(d){S.m+=d;if(S.m<0){S.m=11;S.y--;}if(S.m>11){S.m=0;S.y++;}render();},
  yr(d){S.y+=d;render();},
  setTax(m){taxMode=m;persistSet();render();},
  close(){S.modal=null;renderModal();},
  incAdd(){S.modal={kind:'income',mode:'add',name:'',type:'hourly',wage:0,payTiming:'next',payDay:10,tax:0};renderModal();},
  incEdit(id){const s=S.income.find(x=>x.id===id);if(!s)return;S.modal={kind:'income',mode:'edit',id,name:s.name,type:s.type||'hourly',wage:s.wage,payTiming:s.payTiming||'next',payDay:(s.payDay!==undefined?s.payDay:10),tax:s.tax||0,confirmDel:false};renderModal();},
  fixAdd(){S.modal={kind:'fixed',mode:'add',name:'',amount:0,category:'주거·공과금',payDay:null,cycle:'monthly',count:1,payMonth:(S.m+1)};renderModal();},
  fixEdit(id){const f=S.fixed.find(x=>x.id===id);if(!f)return;S.modal={kind:'fixed',mode:'edit',id,name:f.name,amount:f.amount,category:f.category,payDay:(f.payDay!==undefined?f.payDay:null),cycle:f.cycle||'monthly',count:f.count||1,payMonth:f.payMonth||(S.m+1),confirmDel:false};renderModal();},
  txAdd(){S.modal={kind:'tx',mode:'add',amount:0,category:CATS[0][0],date:todayISO(),memo:'',receipt:null,fx:null,type:'expense'};renderModal();},
  txAddIncome(){S.modal={kind:'tx',mode:'add',amount:0,category:'수입',date:todayISO(),memo:'',receipt:null,fx:null,type:'income'};renderModal();},
  txKind(k){const md=S.modal;md.type=k;if(k==='income')md.category='수입';else if(md.category==='수입')md.category=CATS[0][0];renderModal();},
  txEdit(id){const t=S.tx.find(x=>x.id===id);if(!t)return;S.modal={kind:'tx',mode:'edit',id,amount:t.amount,category:t.category,date:t.date,memo:t.memo||'',receipt:t.receipt||null,fx:t.fx||null,type:t.type||'expense',confirmDel:false};renderModal();},
  budAdd(){S.modal={kind:'budget',mode:'add',category:'레슨·전공',amount:0};renderModal();},
  budEdit(c){S.modal={kind:'budget',mode:'edit',category:c,amount:S.budgets[c]||0};renderModal();},
  setType(t){S.modal.type=t;renderModal();},
  setTiming(t){S.modal.payTiming=t;renderModal();},
  setCat(n){S.modal.category=n;renderModal();},
  setDay(d){S.modal.payDay=d;renderModal();},
  setCycle(c){S.modal.cycle=c;renderModal();},
  countIn(el){const d=(el.value||'').replace(/[^0-9]/g,'');S.modal.count=d?parseInt(d,10):0;renderModal();},
  setPayMonth(m){S.modal.payMonth=m;renderModal();},
  setTaxRate(v){S.modal.tax=v;renderModal();},
  taxCustom(el){let v=parseFloat((el.value||'').replace(/[^0-9.]/g,''));if(isNaN(v)){renderModal();return;}if(v<0)v=0;if(v>100)v=100;S.modal.tax=v;renderModal();},
  dayCustom(el){let d=parseInt((el.value||'').replace(/[^0-9]/g,''),10);if(isNaN(d)){renderModal();return;}if(d<1)d=1;if(d>31)d=31;S.modal.payDay=d;renderModal();},
  nameIn(v){S.modal.name=v;refreshSave();},
  amtIn(el){const d=el.value.replace(/[^0-9]/g,'');S.modal.amount=d?parseInt(d,10):0;el.value=d?parseInt(d,10).toLocaleString('ko-KR'):'';refreshSave();},
  wageIn(el){const d=el.value.replace(/[^0-9]/g,'');S.modal.wage=d?parseInt(d,10):0;el.value=d?parseInt(d,10).toLocaleString('ko-KR'):'';refreshSave();},
  dateIn(v){S.modal.date=v;},
  memoIn(v){S.modal.memo=v;},
  save(){const md=S.modal;if(!validOf(md))return;
    if(md.kind==='income'){if(md.mode==='add')S.income.push({id:newId(),name:md.name.trim(),type:md.type,wage:md.wage,payTiming:md.payTiming,payDay:md.payDay,tax:md.tax||0});else{const s=S.income.find(x=>x.id===md.id);Object.assign(s,{name:md.name.trim(),type:md.type,wage:md.wage,payTiming:md.payTiming,payDay:md.payDay,tax:md.tax||0});}persistIncome();}
    else if(md.kind==='fixed'){const extra={cycle:md.cycle||'monthly',count:md.count||1,payMonth:md.payMonth||1};if(md.mode==='add')S.fixed.push(Object.assign({id:newId(),name:md.name.trim(),amount:md.amount,category:md.category,payDay:md.payDay},extra));else{const f=S.fixed.find(x=>x.id===md.id);Object.assign(f,{name:md.name.trim(),amount:md.amount,category:md.category,payDay:md.payDay},extra);}persistFixed();}
    else if(md.kind==='budget'){S.budgets[md.category]=md.amount;persistBud();}
    else if(md.kind==='account'){if(md.mode==='add')S.accounts.push({id:newId(),name:md.name.trim(),balance:md.amount});else{const a=S.accounts.find(x=>x.id===md.id);Object.assign(a,{name:md.name.trim(),balance:md.amount});}persistAcct();}
    else{const memo=(md.memo||'').trim();const rec=md.receipt||null;const fx=(md.fx&&md.fx.orig&&md.fx.rate)?{cur:(md.fx.cur||'').trim(),orig:md.fx.orig,rate:md.fx.rate}:null;if(md.mode==='add')S.tx.push({id:newId(),amount:md.amount,category:md.category,date:md.date,memo,receipt:rec,fx,type:md.type||'expense'});else{const t=S.tx.find(x=>x.id===md.id);Object.assign(t,{amount:md.amount,category:md.category,date:md.date,memo,receipt:rec,fx,type:md.type||'expense'});}if(memo&&md.type!=='income')rememberCat(memo,md.category);const ok=persistTx();if(!ok&&rec)alert('저장 공간이 부족할 수 있어요. 영수증 사진이 많으면 설정에서 백업 후 정리하세요.');}
    S.modal=null;render();},
  askDel(){S.modal.confirmDel=true;renderModal();},
  cancelDel(){S.modal.confirmDel=false;renderModal();},
  doDel(){const md=S.modal;if(md.kind==='income'){S.income=S.income.filter(x=>x.id!==md.id);persistIncome();}else if(md.kind==='fixed'){S.fixed=S.fixed.filter(x=>x.id!==md.id);persistFixed();}else if(md.kind==='account'){S.accounts=S.accounts.filter(x=>x.id!==md.id);persistAcct();}else{S.tx=S.tx.filter(x=>x.id!==md.id);persistTx();}S.modal=null;render();},
  budDel(){delete S.budgets[S.modal.category];persistBud();S.modal=null;render();},
  recv(id){const mk=curKey();S.received[mk]=S.received[mk]||{};S.received[mk][id]=!S.received[mk][id];if(!S.received[mk][id])delete S.received[mk][id];persistRecv();render();},
  qIn(id,raw){let v=raw.replace(/[^0-9.]/g,'');const p=v.split('.');if(p.length>2)v=p[0]+'.'+p.slice(1).join('');const num=v===''?0:(parseFloat(v)||0);const mk=curKey();S.qty[mk]=S.qty[mk]||{};S.qty[mk][id]=num;const s=S.income.find(j=>j.id===id);if(num>0&&s){S.snap[mk]=S.snap[mk]||{};S.snap[mk][id]={wage:s.wage,tax:s.tax||0};}const pay=Math.round(num*s.wage*taxFactor(s));const pc=document.getElementById('pay_'+id);if(pc)pc.textContent=fmt(pay);const tv=document.getElementById('incTotalView');if(tv)tv.textContent=fmt(incTotal());},
  qCommit(){persistQty();persistSnap();render();},
  receiptPick(input){const f=input.files&&input.files[0];if(!f)return;compressImage(f,d=>{if(d){S.modal.receipt=d;renderModal();}else alert('이미지를 처리할 수 없어요');});},
  receiptClear(){S.modal.receipt=null;renderModal();},
  fxCur(v){S.modal.fx=S.modal.fx||{};S.modal.fx.cur=v;},
  fxOrig(v){S.modal.fx=S.modal.fx||{};const n=parseFloat((v||'').replace(/[^0-9.]/g,''));S.modal.fx.orig=isNaN(n)?0:n;if(S.modal.fx.orig&&S.modal.fx.rate)S.modal.amount=Math.round(S.modal.fx.orig*S.modal.fx.rate);renderModal();},
  fxRate(v){S.modal.fx=S.modal.fx||{};const n=parseFloat((v||'').replace(/[^0-9.]/g,''));S.modal.fx.rate=isNaN(n)?0:n;if(S.modal.fx.orig&&S.modal.fx.rate)S.modal.amount=Math.round(S.modal.fx.orig*S.modal.fx.rate);renderModal();},
  bulkOpen(){S.modal={kind:'bulk',text:'',rows:[]};renderModal();},
  bulkText(v){S.modal.text=v;},
  bulkParse(){S.modal.rows=parseLines(S.modal.text);renderModal();},
  bulkRemove(i){S.modal.rows.splice(i,1);if(S.modal.editIdx!=null&&S.modal.editIdx>=S.modal.rows.length)S.modal.editIdx=null;renderModal();},
  bulkPickCat(i){S.modal.editIdx=S.modal.editIdx===i?null:i;renderModal();},
  bulkSetCat(i,n){S.modal.rows[i].category=n;S.modal.editIdx=null;renderModal();},
  searchIn(v){S.q=v;render();},
  bulkAdd(){const rows=S.modal.rows||[];rows.forEach(r=>{S.tx.push({id:newId(),amount:r.amount,category:r.category,date:r.date,memo:r.memo,receipt:null,fx:null,type:'expense'});if(r.memo)rememberCat(r.memo,r.category);});persistTx();S.modal=null;S.view='expense';S.exTab='irregular';render();},
  acctAdd(){S.modal={kind:'account',mode:'add',name:'',amount:0};renderModal();},
  acctEdit(id){const a=S.accounts.find(x=>x.id===id);if(!a)return;S.modal={kind:'account',mode:'edit',id,name:a.name,amount:a.balance||0,confirmDel:false};renderModal();},
  cardTargetIn(el){const d=el.value.replace(/[^0-9]/g,'');S.settings.cardTarget=d?parseInt(d,10):0;el.value=d?parseInt(d,10).toLocaleString('ko-KR'):'';persistSet();},
  csvExport(){try{const rows=[['날짜','구분','항목','금액','세전','세후','세금','메모']];
    [...S.tx].filter(t=>t.type!=='income').sort((a,b)=>a.date<b.date?-1:1).forEach(t=>rows.push([t.date,'지출',t.category,String(-t.amount),'','','',(t.memo||'')]));
    [...S.tx].filter(t=>t.type==='income').sort((a,b)=>a.date<b.date?-1:1).forEach(t=>rows.push([t.date,'수입(비정기)',(t.memo||'수입'),String(t.amount),'','','',(t.memo||'')]));
    const srows=[];Object.keys(S.qty).forEach(mk=>{S.income.forEach(s=>{const q=qtyOf(s.id,mk);if(q>0){const r=rateFor(s,mk);const g=Math.round(q*r.wage);const n=Math.round(g*(1-(r.tax||0)/100));srows.push([mk+'-01','수입(정기)',s.name,String(n),String(g),String(n),String(g-n),(s.type==='fixed'?q+'회':q+'h')+(r.tax?(' · '+r.tax+'%'):'')]);}});});
    srows.sort((a,b)=>a[0]<b[0]?-1:1).forEach(r=>rows.push(r));
    const csv='\ufeff'+rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='가계부_전체내역_'+ymd()+'.csv';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);}catch(e){alert('CSV 내보내기 실패');}},
  async shareBackup(){try{const data={v:2,income:S.income,qty:S.qty,snap:S.snap,fixed:S.fixed,tx:S.tx,received:S.received,budgets:S.budgets,accounts:S.accounts,learned:S.learned,settings:{taxMode:taxMode,cardTarget:S.settings.cardTarget||0}};const json=JSON.stringify(data,null,2);const fname='가계부_backup_'+ymd()+'.json';let shared=false;try{const file=new File([json],fname,{type:'application/json'});if(navigator.canShare&&navigator.canShare({files:[file]})){await navigator.share({files:[file],title:'가계부 백업'});shared=true;}}catch(e){}if(!shared){const blob=new Blob([json],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fname;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);}S.settings.lastBackup=new Date().toISOString();persistSet();if(S.view==='settings'||S.view==='home')render();}catch(e){}},
  resetLearned(){if(!confirm('자동분류 학습 기록을 초기화할까요?'))return;S.learned={};persistLearn();alert('초기화했어요');},
  exportData(){try{const data={v:1,income:S.income,qty:S.qty,fixed:S.fixed,tx:S.tx,received:S.received,budgets:S.budgets,settings:{taxMode:taxMode}};const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');const d=new Date();a.href=url;a.download='가계부_backup_'+d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate())+'.json';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);}catch(e){alert('내보내기에 실패했어요');}},
  importData(input){const f=input.files&&input.files[0];if(!f)return;const r=new FileReader();r.onload=()=>{try{const d=JSON.parse(r.result);if(d.income)S.income=d.income;if(d.qty)S.qty=d.qty;if(d.snap)S.snap=d.snap;if(d.fixed)S.fixed=d.fixed;if(d.tx)S.tx=d.tx;if(d.received)S.received=d.received;if(d.budgets)S.budgets=d.budgets;if(d.settings&&d.settings.taxMode)taxMode=d.settings.taxMode;persistAll();input.value='';render();alert('불러오기 완료');}catch(e){alert('파일을 읽을 수 없어요');}};r.readAsText(f);},
  resetAll(){if(!confirm('모든 데이터를 삭제할까요? 되돌릴 수 없어요.'))return;[K_INCOME,K_QTY,K_SNAP,K_FIXED,K_TX,K_RECV,K_BUD,K_SET,K_SEED].forEach(k=>{try{localStorage.removeItem(k);}catch(e){}});S.income=[];S.qty={};S.snap={};S.fixed=[];S.tx=[];S.received={};S.budgets={};S.settings={};taxMode='net';S.view='home';load();},
};

document.getElementById('ov').addEventListener('click',e=>{if(e.target.id==='ov')FIN.close();});
document.addEventListener('keydown',e=>{if(e.key==='Escape'){if(S.modal)FIN.close();else if(S.view!=='home')FIN.go('home');}});
load();
</script>
</body>
</html>
